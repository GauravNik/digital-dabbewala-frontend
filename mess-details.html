<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mess Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="./images/css/mess-details.css">

</head>

<body>

    <!-- Background -->
    <div class="gradient-top"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb-2"></div>


    <!-- NAVBAR -->
    <nav class="navbar fixed-top navbar-expand-lg">
        <div class="container d-flex justify-content-between align-items-center">

            <a href="index.html" class="navbar-brand brand d-flex align-items-center gap-2">

                <div class="logo-box" style="display:inline-flex;align-items:center;justify-content:center;
padding:8px;border-radius:14px;
background:linear-gradient(135deg,#FF6B35,#FFB84D);
box-shadow:0 8px 20px rgba(255,140,0,0.35);">

                    <svg width="34" height="34" viewBox="0 0 32 32" fill="none">

                        <rect x="6" y="6" width="20" height="5" rx="1.5" fill="white" />
                        <circle cx="16" cy="8.5" r="1" fill="#FFB84D" />

                        <rect x="6" y="12" width="20" height="6" rx="1.5" fill="white" />
                        <rect x="6" y="19" width="20" height="7" rx="1.5" fill="white" />

                    </svg>

                </div>

                <span style="font-weight:800;font-size:1.35rem;color:#1B5E20;">Digital</span>
                <span style="font-weight:800;font-size:1.35rem;color:#FF8C00;">Dabbewala</span>

            </a>

            <a href="mess-list.html" class="btn btn-glow">Back to Listings</a>

        </div>
    </nav>



    <!-- HERO SECTION -->
    <header class="hero-image">

        <div class="overlay text-center">

            <h1 id="messTitle" class="text-white fw-bold display-5"></h1>

            <p id="messCuisine" class="text-light"></p>

        </div>

    </header>



    <!-- DETAILS -->
    <section class="section container">

        <div class="row g-4">

            <div class="col-md-8">

                <div class="card-x p-4">

                    <h3 class="text-green fw-bold">About</h3>

                    <p id="messDescription"></p>

                    <div class="info-grid">

                        <div class="info-box">

                            <span class="material-symbols-outlined text-orange">schedule</span>

                            <div>

                                <h6>Timings</h6>

                                <p id="messLunch"></p>
                                <p id="messDinner"></p>

                            </div>

                        </div>

                        <div class="info-box">

                            <span class="material-symbols-outlined text-orange">restaurant_menu</span>

                            <div>

                                <h6>Cuisine</h6>

                                <p id="messCuisineInfo"></p>

                            </div>

                        </div>

                    </div>

                </div>



                <div class="card-x mt-4 p-4">

                    <h3 class="text-green fw-bold">Contact</h3>

                    <p>📞 +91 98765 43210</p>
                    <p>💬 WhatsApp Available</p>

                </div>

            </div>



            <div class="col-md-4">

                <div class="card-x p-4 text-center">

                    <h4 class="fw-bold">Monthly Plan</h4>

                    <div id="messPrice" class="price"></div>

                    <p id="messAddress" class="text-muted"></p>

                    <button onclick="subscribeMess()" class="btn btn-glow w-100">
                        Subscribe Now
                    </button>

                </div>

            </div>

        </div>
        <!-- ⭐ REVIEW SECTION -->
        <section class="section container">

            <!-- Add Review Card -->
            <div class="card-x p-4 mb-4">

                <h3 class="fw-bold mb-3" style="color: var(--green);">
                    ⭐ Add Your Review
                </h3>

                <form id="reviewForm">

                    <!-- Rating -->
                    <div class="mb-3">
                        <label class="form-label">Rating (1–5)</label>
                        <input type="number" id="rating" min="1" max="5" class="form-control" placeholder="Enter rating"
                            required>
                    </div>

                    <!-- Comment -->
                    <div class="mb-3">
                        <label class="form-label">Comment</label>
                        <textarea id="comment" class="form-control" placeholder="Write your experience..." rows="3"
                            required></textarea>
                    </div>

                    <button class="btn-glow">Submit Review</button>

                </form>

            </div>


            <!-- Reviews Display -->
            <div class="card-x p-4">

                <h3 class="fw-bold mb-3" style="color: var(--green);">
                    💬 Customer Reviews
                </h3>

                <!-- Average Rating -->
                <div id="avgRating" class="mb-3" style="font-weight:600; color: var(--orange);"></div>

                <div id="reviewsContainer"></div>

            </div>

        </section>

    </section>



    <footer class="text-center py-4 mt-5 border-top">

        © 2025 Dabbewala | All Rights Reserved

    </footer>



    <script>
        

        

        // ===================== GET USER =====================
        const user = JSON.parse(localStorage.getItem("user"))


        // ===================== GET ID =====================
        function getMessId() {
            const params = new URLSearchParams(window.location.search)
            return params.get("id")
        }


        // ===================== LOAD MESS DETAILS =====================
        async function loadMessDetails() {

            const id = getMessId()

            if (!id) {
                console.log("No mess ID")
                return
            }

            try {

                const res = await fetch(`https://digital-dabbewala-backend.onrender.com/api/mess/${id}`)
                const mess = await res.json()

                console.log("MESS:", mess)

                // SET DATA
                document.getElementById("messTitle").innerText = mess.mess_name
                document.getElementById("messCuisine").innerText = mess.cuisine || ""
                document.getElementById("messCuisineInfo").innerText = mess.cuisine || ""
                document.getElementById("messDescription").innerText = mess.description || ""
                document.getElementById("messPrice").innerText = "₹" + mess.price + " / month"
                document.getElementById("messAddress").innerText = mess.address

                document.getElementById("messLunch").innerText =
                    "Lunch: " + (mess.lunch_start || "12 PM") + " - " + (mess.lunch_end || "2 PM")

                document.getElementById("messDinner").innerText =
                    "Dinner: " + (mess.dinner_start || "7 PM") + " - " + (mess.dinner_end || "9 PM")

                // IMAGE
                document.querySelector(".hero-image").style.backgroundImage =
                    `url(https://digital-dabbewala-backend.onrender.com/uploads/${mess.image})`

            } catch (err) {
                console.log("Error:", err)
            }

        }


        // ===================== SUBSCRIBE =====================
        async function subscribeMess() {

            if (!user) {
                alert("Please login first")
                window.location.href = "login.html"
                return
            }

            const mess_id = getMessId()

            await fetch("https://digital-dabbewala-backend.onrender.com/api/mess/subscribe", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    user_id: user.id,
                    mess_id
                })

            })

            alert("Subscribed successfully!")

        }


        // ===================== LOAD REVIEWS =====================
        async function loadReviews() {

            const id = getMessId()

            const res = await fetch(`https://digital-dabbewala-backend.onrender.com/api/mess/reviews/${id}`)
            const reviews = await res.json()

            const container = document.getElementById("reviewsContainer")
            const avgDiv = document.getElementById("avgRating")

            container.innerHTML = ""


            // ⭐ AVERAGE RATING
            if (reviews.length > 0) {

                const avg = (reviews.reduce((a, b) => a + b.rating, 0) / reviews.length).toFixed(1)

                avgDiv.innerText = "⭐ Average Rating: " + avg + " / 5"

            } else {

                avgDiv.innerText = "No reviews yet"

            }


            // SHOW REVIEWS
            reviews.forEach(r => {

                container.innerHTML += `

<div class="info-box mb-3">

  <div>
    <h6 style="margin:0; font-weight:700; color: var(--green);">
      ${r.user_name}
    </h6>

    <p style="margin:4px 0; color: var(--orange); font-weight:600;">
      ⭐ ${r.rating}/5
    </p>

    <p style="margin:0; color: var(--muted);">
      ${r.comment}
    </p>
  </div>

</div>

`

            })

        }


        // ===================== ADD REVIEW =====================
        document.getElementById("reviewForm").addEventListener("submit", async (e) => {

            e.preventDefault()

            if (!user) {
                alert("Please login first")
                window.location.href = "login.html"
                return
            }

            const mess_id = getMessId()
            const rating = document.getElementById("rating").value
            const comment = document.getElementById("comment").value

            await fetch("https://digital-dabbewala-backend.onrender.com/api/mess/review", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    mess_id,
                    user_name: user.name,
                    rating,
                    comment
                })

            })

            alert("Review added!")

            loadReviews()

        })


        // ===================== LOAD PAGE =====================
        loadMessDetails()
        loadReviews()

        
    </script>

</body>

</html>
