<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dabbewala – Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./images/css/style.css" rel="stylesheet">
</head>

<body>

<section class="section d-flex align-items-center justify-content-center" style="min-height:90vh;">

<div class="card-x" style="max-width:400px;width:100%;">

<h3 class="text-center mb-4">Login</h3>

<form id="loginForm">

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" required>
</div>

<button type="submit" class="btn-glow w-100">Login</button>

<p class="text-center mt-3">
<a href="register.html">Create account</a>
</p>

</form>

</div>

</section>


<script>

const form=document.getElementById("loginForm")

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const res = await fetch("https://digital-dabbewala-backend.onrender.com/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

})

const data = await res.json()

if(data.success){

localStorage.setItem("user",JSON.stringify(data.user))

if(data.user.role==="provider"){

window.location.href="provider-dashboard-mess.html"

}else{

window.location.href="mess-list.html"

}

}else{

alert("Invalid email or password")

}

})

</script>

</body>
</html>
