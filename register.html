<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dabbewala – Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./images/css/style.css" rel="stylesheet">
</head>

<body>

<section class="section d-flex align-items-center justify-content-center" style="min-height:95vh;">
<div class="card-x" style="max-width:450px;width:100%;">

<h3 class="text-center mb-4">Create Account</h3>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Role</label>
<select id="role" class="form-control">
<option value="user">User</option>
<option value="provider">Mess Provider</option>
</select>
</div>

<button type="submit" class="btn-glow w-100 mb-3">Register</button>

<p class="text-center">
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>
</section>

<script>

const form = document.getElementById("registerForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value
const role=document.getElementById("role").value

const res = await fetch("https://digital-dabbewala-backend.onrender.com/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
password,
role
})

})

const data = await res.json()

alert("Registration successful")

window.location.href="login.html"

})

</script>

</body>
</html>
